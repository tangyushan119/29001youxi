<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试全屏布局</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 2px solid #4a69bd;
            min-height: 70px;
            z-index: 100;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            margin: 5px;
            padding: 5px 15px;
            background: rgba(74, 105, 189, 0.1);
            border-radius: 8px;
        }

        .status-label {
            font-size: 14px;
            color: #b8c5d6;
            min-width: 50px;
            font-weight: 600;
        }

        .status-value {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            min-width: 45px;
            text-align: right;
        }

        .day-value {
            color: #f39c12;
            font-size: 18px;
        }

        .health-bar, .hunger-bar, .thirst-bar, .stamina-bar {
            width: 90px;
            height: 18px;
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .hunger-fill {
            height: 100%;
            width: 80%;
            background: linear-gradient(90deg, #f1c40f, #f39c12);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .thirst-fill {
            height: 100%;
            width: 90%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        .stamina-fill {
            height: 100%;
            width: 70%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        .game-canvas-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .game-canvas-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .action-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            border: 2px solid rgba(74, 105, 189, 0.3);
            z-index: 100;
        }

        .action-center {
            display: flex;
            gap: 8px;
        }

        .action-extra {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid rgba(74, 105, 189, 0.3);
        }

        .action-btn {
            width: 55px;
            height: 55px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #4a69bd, #3a5a9d);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(74, 105, 189, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .action-btn:hover {
            background: linear-gradient(145deg, #5a79cd, #4a6abd);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 105, 189, 0.5);
        }

        .action-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(74, 105, 189, 0.4);
        }

        .action-btn-center {
            width: 75px;
            height: 55px;
            font-size: 14px;
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .action-btn-center:hover {
            background: linear-gradient(145deg, #f75c4c, #d0493b);
        }

        .action-extra .action-btn {
            width: 70px;
            height: 42px;
            font-size: 12px;
            background: linear-gradient(145deg, #2c3e50, #1a252f);
        }

        .action-extra .action-btn:hover {
            background: linear-gradient(145deg, #3c4e60, #2a353f);
        }

        @media (max-width: 600px) {
            .status-bar {
                padding: 8px 10px;
                min-height: 60px;
            }

            .status-item {
                padding: 3px 10px;
                gap: 6px;
            }

            .health-bar, .hunger-bar, .thirst-bar, .stamina-bar {
                width: 60px;
                height: 14px;
            }

            .status-label, .status-value {
                font-size: 12px;
            }

            .action-btn {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }

            .action-btn-center {
                width: 65px;
                height: 48px;
                font-size: 12px;
            }

            .action-extra {
                gap: 8px;
            }

            .action-extra .action-btn {
                width: 60px;
                height: 38px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="status-bar">
            <div class="status-item">
                <span class="status-label">生命值</span>
                <div class="health-bar">
                    <div class="health-fill"></div>
                </div>
                <span class="status-value">100</span>
            </div>
            <div class="status-item">
                <span class="status-label">饥饿度</span>
                <div class="hunger-bar">
                    <div class="hunger-fill"></div>
                </div>
                <span class="status-value">80</span>
            </div>
            <div class="status-item">
                <span class="status-label">口渴度</span>
                <div class="thirst-bar">
                    <div class="thirst-fill"></div>
                </div>
                <span class="status-value">90</span>
            </div>
            <div class="status-item">
                <span class="status-label">体力值</span>
                <div class="stamina-bar">
                    <div class="stamina-fill"></div>
                </div>
                <span class="status-value">70</span>
            </div>
            <div class="status-item">
                <span class="status-label">天数</span>
                <span class="status-value day-value">第 1 天</span>
            </div>
        </header>

        <main class="game-canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </main>

        <footer class="action-bar">
            <button class="action-btn" id="btnMoveUp">↑</button>
            <div class="action-center">
                <button class="action-btn" id="btnMoveLeft">←</button>
                <button class="action-btn action-btn-center" id="btnInteract">交互</button>
                <button class="action-btn" id="btnMoveRight">→</button>
            </div>
            <button class="action-btn" id="btnMoveDown">↓</button>
            <div class="action-extra">
                <button class="action-btn" id="btnInventory">背包</button>
                <button class="action-btn" id="btnCraft">制作</button>
                <button class="action-btn" id="btnMap">地图</button>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawTestScene();
        }

        function drawTestScene() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#2d5a3d';
            ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);

            ctx.fillStyle = '#8b4513';
            ctx.fillRect(canvas.width * 0.3, canvas.height * 0.6, 80, 100);

            ctx.fillStyle = '#4a90d9';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.8, canvas.height * 0.25, 60, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('测试全屏布局 - 画布已铺满整个可视区域', canvas.width / 2, canvas.height / 2);
            ctx.fillText('方向控制按键组位于右下角', canvas.width / 2, canvas.height / 2 + 30);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const buttons = document.querySelectorAll('.action-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                console.log('点击:', btn.textContent);
            });
        });
    </script>
</body>
</html>
