<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背包系统测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .test-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .test-header h1 {
            color: #4a69bd;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .test-header p {
            color: #b8c5d6;
            font-size: 14px;
        }

        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid #4a69bd;
        }

        .test-title {
            color: #4a69bd;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .test-title::before {
            content: '📋';
            font-size: 20px;
        }

        .test-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .test-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(145deg, #4a69bd, #3a5a9d);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 105, 189, 0.4);
        }

        .test-btn.secondary {
            background: linear-gradient(145deg, #6c757d, #495057);
        }

        .test-btn.danger {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
        }

        .test-btn.success {
            background: linear-gradient(145deg, #27ae60, #1e8449);
        }

        .inventory-preview {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .inventory-items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .inventory-item-tag {
            background: rgba(74, 105, 189, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .inventory-item-tag .icon {
            font-size: 18px;
        }

        .inventory-item-tag .name {
            color: #fff;
        }

        .inventory-item-tag .count {
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 8px;
            border-radius: 10px;
            color: #f39c12;
            font-weight: bold;
        }

        .test-results {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }

        .test-result-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(74, 105, 189, 0.2);
        }

        .test-result-item:last-child {
            border-bottom: none;
        }

        .test-result-item.pass {
            color: #27ae60;
        }

        .test-result-item.fail {
            color: #e74c3c;
        }

        .test-result-item.info {
            color: #3498db;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(20px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .inventory-overlay {
            animation: fadeIn 0.2s ease;
        }

        .inventory-modal {
            animation: slideUp 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="test-header">
        <h1>🎒 背包系统测试</h1>
        <p>测试背包交互、渲染和物品管理功能</p>
    </div>

    <div class="test-section">
        <div class="test-title">基础测试</div>
        <div class="test-controls">
            <button class="test-btn" onclick="testOpenInventory()">
                <span>🎒</span> 打开背包
            </button>
            <button class="test-btn secondary" onclick="testOpenEmptyInventory()">
                <span>📭</span> 打开空背包
            </button>
            <button class="test-btn secondary" onclick="testOpenFullInventory()">
                <span>📦</span> 打开满背包
            </button>
        </div>
        <div class="inventory-preview" id="currentInventory">
            <strong style="color: #4a69bd;">当前测试物品:</strong>
            <div class="inventory-items-list" id="inventoryItemsList"></div>
        </div>
    </div>

    <div class="test-section">
        <div class="test-title">测试结果</div>
        <div class="test-results" id="testResults"></div>
    </div>

    <script type="module">
        import { SimpleInventory } from './src/ui/inventory/SimpleInventory.js';
        import { InventoryItems } from './src/ui/inventory/inventory-items.js';

        let inventoryManager = null;

        const getItemConfig = (itemType) => {
            return {
                name: InventoryItems.getItemName(itemType),
                icon: InventoryItems.getItemIcon(itemType)
            };
        };

        const testInventoryData = {
            seeds: 15,
            food: 8,
            water: 12,
            wood: 25,
            stone: 18,
            grass: 30,
            medicine: 5,
            iron: 10,
            leather: 3,
            cloth: 7,
            gold: 100
        };

        const emptyInventoryData = {};

        const fullInventoryData = {
            seeds: 99,
            food: 99,
            water: 99,
            wood: 99,
            stone: 99,
            grass: 99,
            medicine: 30,
            iron: 50,
            leather: 30,
            cloth: 50,
            gold: 999,
            equipment: 1
        };

        function updateInventoryPreview(data) {
            const list = document.getElementById('inventoryItemsList');
            list.innerHTML = '';
            
            if (Object.keys(data).length === 0) {
                list.innerHTML = '<span style="color: #b8c5d6;">背包为空</span>';
                return;
            }

            for (const [type, count] of Object.entries(data)) {
                if (count > 0) {
                    const item = getItemConfig(type) || { name: type, icon: '📦' };
                    const tag = document.createElement('div');
                    tag.className = 'inventory-item-tag';
                    tag.innerHTML = `
                        <span class="icon">${item.icon}</span>
                        <span class="name">${item.name}</span>
                        <span class="count">${count}</span>
                    `;
                    list.appendChild(tag);
                }
            }
        }

        function testOpenInventory() {
            addResult('info', '正在打开背包...');
            
            if (inventoryManager && inventoryManager.isModalOpen()) {
                inventoryManager.close();
            }

            inventoryManager = new SimpleInventory();
            
            inventoryManager.setOnCloseCallback((updatedInventory) => {
                addResult('info', '背包已关闭');
                updateInventoryPreview(updatedInventory);
            });
            
            inventoryManager.setOnItemUseCallback((itemType, itemCount) => {
                const item = getItemConfig(itemType) || { name: itemType };
                addResult('info', `使用了 ${item.name} x${itemCount}`);
            });
            
            inventoryManager.open(testInventoryData);
            updateInventoryPreview(testInventoryData);
            
            addResult('pass', '背包窗口已成功打开');
        }

        function testOpenEmptyInventory() {
            addResult('info', '正在打开空背包...');
            
            if (inventoryManager && inventoryManager.isModalOpen()) {
                inventoryManager.close();
            }

            inventoryManager = new SimpleInventory();
            inventoryManager.open(emptyInventoryData);
            updateInventoryPreview(emptyInventoryData);
            
            addResult('pass', '空背包窗口已成功打开');
        }

        function testOpenFullInventory() {
            addResult('info', '正在打开满背包...');
            
            if (inventoryManager && inventoryManager.isModalOpen()) {
                inventoryManager.close();
            }

            inventoryManager = new SimpleInventory();
            inventoryManager.open(fullInventoryData);
            updateInventoryPreview(fullInventoryData);
            
            addResult('pass', '满背包窗口已成功打开');
        }

        function addResult(type, message) {
            const container = document.getElementById('testResults');
            const item = document.createElement('div');
            item.className = `test-result-item ${type}`;
            item.textContent = message;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        updateInventoryPreview(testInventoryData);
        addResult('info', '测试页面已加载，点击上方按钮测试背包功能');
        addResult('info', '点击背包窗口外的空白区域可关闭背包');
        addResult('info', '按 ESC 键也可关闭背包');
    </script>
</body>
</html>
