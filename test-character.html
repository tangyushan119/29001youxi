<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物显示与移动动画测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .test-section {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .test-canvas-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .canvas-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #b8c5d6;
        }
        
        .control-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            min-width: 250px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .control-panel h3 {
            margin-top: 0;
            color: #00d4ff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }
        
        .direction-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        
        .direction-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        
        .direction-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }
        
        .direction-btn:active {
            transform: translateY(0);
        }
        
        .direction-btn.center {
            grid-column: 2;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        
        .status-info {
            margin-top: 20px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status-label {
            color: #b8c5d6;
        }
        
        .status-value {
            color: #00d4ff;
            font-weight: bold;
        }
        
        .animation-controls {
            margin-top: 20px;
        }
        
        .animation-controls label {
            display: block;
            margin-bottom: 8px;
            color: #b8c5d6;
        }
        
        .animation-controls input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }
        
        .animation-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        
        .test-info {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
        }
        
        .test-info h3 {
            color: #00d4ff;
            margin-top: 0;
        }
        
        .test-info ul {
            color: #b8c5d6;
            line-height: 1.8;
        }
        
        .test-info li {
            margin-bottom: 8px;
        }
        
        .success {
            color: #00ff88;
        }
        
        .info {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 人物显示与移动动画测试</h1>
        
        <div class="test-section">
            <div class="test-canvas-wrapper">
                <div class="canvas-title">人物动画预览</div>
                <canvas id="testCanvas" width="400" height="400"></canvas>
            </div>
            
            <div class="control-panel">
                <h3>方向控制</h3>
                <div class="direction-buttons">
                    <div></div>
                    <button class="direction-btn" data-dir="up">↑</button>
                    <div></div>
                    <button class="direction-btn" data-dir="left">←</button>
                    <button class="direction-btn center" id="btnStop">⏹</button>
                    <button class="direction-btn" data-dir="right">→</button>
                    <div></div>
                    <button class="direction-btn" data-dir="down">↓</button>
                    <div></div>
                </div>
                
                <div class="status-info">
                    <div class="status-item">
                        <span class="status-label">方向:</span>
                        <span class="status-value" id="statusDirection">down</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">状态:</span>
                        <span class="status-value" id="statusWalking">静止</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">X坐标:</span>
                        <span class="status-value" id="statusX">200</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Y坐标:</span>
                        <span class="status-value" id="statusY">200</span>
                    </div>
                </div>
                
                <div class="animation-controls">
                    <label for="animSpeed">动画速度: <span id="animSpeedValue">1.0x</span></label>
                    <input type="range" id="animSpeed" min="0.1" max="3" step="0.1" value="1">
                </div>
            </div>
        </div>
        
        <div class="test-info">
            <h3>测试功能说明</h3>
            <ul>
                <li><span class="success">✓</span> 人形绘制测试 - 验证人物各部位（头、躯干、四肢）正确渲染</li>
                <li><span class="success">✓</span> 方向测试 - 验证人物四个方向（上、下、左、右）正确显示</li>
                <li><span class="success">✓</span> 行走动画测试 - 验证行走时四肢摆动、头部晃动效果</li>
                <li><span class="success">✓</span> 阴影动画测试 - 验证行走时阴影缩放和偏移效果</li>
                <li><span class="info">⌨️</span> 键盘控制 - 支持 WASD 或方向键控制人物移动</li>
                <li><span class="info">🎚️</span> 动画速度调节 - 可通过滑块调整动画播放速度</li>
            </ul>
        </div>
    </div>
    
    <script type="module">
        import { Player } from './src/game/Player.js';
        import { PlayerRenderer } from './src/game/PlayerRenderer.js';
        
        class CharacterTest {
            constructor() {
                this.canvas = document.getElementById('testCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.player = new Player({
                    x: 184,
                    y: 176,
                    width: 32,
                    height: 48
                });
                
                this.playerRenderer = new PlayerRenderer();
                
                this.animationSpeed = 1;
                this.lastUpdateTime = Date.now();
                
                this.setupEventListeners();
                this.startLoop();
            }
            
            setupEventListeners() {
                const directionButtons = document.querySelectorAll('.direction-btn[data-dir]');
                directionButtons.forEach(btn => {
                    btn.addEventListener('mousedown', (e) => {
                        const direction = e.target.dataset.dir;
                        this.startMove(direction);
                    });
                    btn.addEventListener('mouseup', () => {
                        this.stopMove();
                    });
                    btn.addEventListener('mouseleave', () => {
                        this.stopMove();
                    });
                });
                
                document.getElementById('btnStop').addEventListener('click', () => {
                    this.stopMove();
                });
                
                document.getElementById('animSpeed').addEventListener('input', (e) => {
                    this.animationSpeed = parseFloat(e.target.value);
                    document.getElementById('animSpeedValue').textContent = `${this.animationSpeed.toFixed(1)}x`;
                });
                
                document.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'ArrowUp':
                        case 'w':
                        case 'W':
                            e.preventDefault();
                            this.startMove('up');
                            break;
                        case 'ArrowDown':
                        case 's':
                        case 'S':
                            e.preventDefault();
                            this.startMove('down');
                            break;
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            e.preventDefault();
                            this.startMove('left');
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            e.preventDefault();
                            this.startMove('right');
                            break;
                    }
                });
                
                document.addEventListener('keyup', () => {
                    this.stopMove();
                });
            }
            
            startMove(direction) {
                this.player.move(direction);
                this.player.clampPosition(this.canvas.width, this.canvas.height);
                this.updateStatus();
            }
            
            stopMove() {
                this.player.stopWalking();
                this.updateStatus();
            }
            
            updateStatus() {
                document.getElementById('statusDirection').textContent = this.player.direction;
                document.getElementById('statusWalking').textContent = this.player.isWalking ? '行走中' : '静止';
                document.getElementById('statusX').textContent = Math.floor(this.player.x);
                document.getElementById('statusY').textContent = Math.floor(this.player.y);
            }
            
            update(deltaTime) {
                this.player.update(deltaTime * this.animationSpeed);
            }
            
            draw() {
                this.ctx.fillStyle = '#1a1a2e';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.fillStyle = '#1e3a5f';
                const tileSize = 40;
                for (let x = 0; x < this.canvas.width; x += tileSize) {
                    for (let y = 0; y < this.canvas.height; y += tileSize) {
                        if ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) {
                            this.ctx.fillRect(x, y, tileSize, tileSize);
                        }
                    }
                }
                
                this.playerRenderer.draw(
                    this.ctx,
                    this.player.getCenterX(),
                    this.player.getCenterY(),
                    this.player.direction,
                    this.player.isWalking,
                    this.player.animationTime
                );
            }
            
            startLoop() {
                const gameLoop = () => {
                    const currentTime = Date.now();
                    const deltaTime = (currentTime - this.lastUpdateTime) / 1000;
                    this.lastUpdateTime = currentTime;
                    
                    this.update(deltaTime);
                    this.draw();
                    
                    requestAnimationFrame(gameLoop);
                };
                gameLoop();
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            new CharacterTest();
        });
    </script>
</body>
</html>
