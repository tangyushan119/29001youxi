<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物模型测试 - 完整人形渲染验证</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #2d2d5a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            margin-bottom: 25px;
            color: #7dd3fc;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(125, 211, 252, 0.5);
        }
        
        .container {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        
        .canvas-container {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(125, 211, 252, 0.2);
        }
        
        canvas {
            border-radius: 12px;
            background: linear-gradient(180deg, #1e1e3e 0%, #16213e 100%);
            display: block;
        }
        
        .control-panel {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 25px;
            width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(125, 211, 252, 0.2);
        }
        
        .panel-title {
            color: #7dd3fc;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(125, 211, 252, 0.3);
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        .control-key {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .control-key:hover {
            background: rgba(125, 211, 252, 0.1);
        }
        
        .key-label {
            color: #a1a1aa;
            font-size: 14px;
        }
        
        .key-code {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            padding: 5px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        
        .status-section {
            margin-bottom: 20px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .status-label {
            color: #9ca3af;
            font-size: 14px;
        }
        
        .status-value {
            color: #4ade80;
            font-weight: bold;
            font-family: monospace;
        }
        
        .direction-display {
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.1), rgba(59, 130, 246, 0.1));
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .direction-arrow {
            font-size: 48px;
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            margin-bottom: 8px;
        }
        
        .direction-text {
            color: #fbbf24;
            font-weight: bold;
        }
        
        .feature-list {
            list-style: none;
            padding-left: 0;
        }
        
        .feature-list li {
            padding: 8px 0 8px 25px;
            position: relative;
            color: #d1d5db;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .feature-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #4ade80;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🦸 人物模型测试 - 完整人形渲染验证</h1>
    
    <div class="container">
        <div class="canvas-container">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        
        <div class="control-panel">
            <div class="panel-title">🎮 控制说明</div>
            
            <div class="controls">
                <div class="control-key">
                    <span class="key-label">向上移动</span>
                    <span class="key-code">W / ↑</span>
                </div>
                <div class="control-key">
                    <span class="key-label">向下移动</span>
                    <span class="key-code">S / ↓</span>
                </div>
                <div class="control-key">
                    <span class="key-label">向左移动</span>
                    <span class="key-code">A / ←</span>
                </div>
                <div class="control-key">
                    <span class="key-label">向右移动</span>
                    <span class="key-code">D / →</span>
                </div>
                <div class="control-key">
                    <span class="key-label">停止移动</span>
                    <span class="key-code">Space</span>
                </div>
            </div>
            
            <div class="direction-display">
                <div class="direction-arrow" id="dirArrow">↓</div>
                <div class="direction-text" id="dirText">向下</div>
            </div>
            
            <div class="status-section">
                <div class="status-row">
                    <span class="status-label">行走状态:</span>
                    <span class="status-value" id="walkStatus">静止</span>
                </div>
                <div class="status-row">
                    <span class="status-label">动画帧:</span>
                    <span class="status-value" id="animFrame">0.00</span>
                </div>
                <div class="status-row">
                    <span class="status-label">位置 X:</span>
                    <span class="status-value" id="posX">200</span>
                </div>
                <div class="status-row">
                    <span class="status-label">位置 Y:</span>
                    <span class="status-value" id="posY">200</span>
                </div>
            </div>
            
            <div class="panel-title">✨ 人物特性</div>
            <ul class="feature-list">
                <li>完整人体结构（头、躯干、四肢）</li>
                <li>分层渲染：阴影→腿部→躯干→手臂→头部</li>
                <li>行走动画：手臂摆动、肘部弯曲</li>
                <li>行走动画：腿部迈步、膝盖弯曲</li>
                <li>头部随行走自然晃动</li>
                <li>动态阴影随步伐变化</li>
                <li>四个方向平滑转向</li>
                <li>精美的面部细节（眼睛、腮红、微笑）</li>
            </ul>
        </div>
    </div>

    <script type="module">
        import { PlayerRenderer } from './src/game/PlayerRenderer.js';
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const playerRenderer = new PlayerRenderer();
        
        const dirArrow = document.getElementById('dirArrow');
        const dirText = document.getElementById('dirText');
        const walkStatus = document.getElementById('walkStatus');
        const animFrame = document.getElementById('animFrame');
        const posX = document.getElementById('posX');
        const posY = document.getElementById('posY');
        
        let px = canvas.width / 2;
        let py = canvas.height / 2;
        let direction = 'down';
        let isWalking = false;
        
        const keys = {};
        const dirMap = {
            up: { x: 0, y: -3, arrow: '↑', text: '向上' },
            down: { x: 0, y: 3, arrow: '↓', text: '向下' },
            left: { x: -3, y: 0, arrow: '←', text: '向左' },
            right: { x: 3, y: 0, arrow: '→', text: '向右' }
        };
        
        function updateDir(newDir) {
            direction = newDir;
            dirArrow.textContent = dirMap[newDir].arrow;
            dirText.textContent = dirMap[newDir].text;
        }
        
        function onKeyDown(e) {
            keys[e.code] = true;
            
            if (e.code === 'KeyW' || e.code === 'ArrowUp') updateDir('up');
            else if (e.code === 'KeyS' || e.code === 'ArrowDown') updateDir('down');
            else if (e.code === 'KeyA' || e.code === 'ArrowLeft') updateDir('left');
            else if (e.code === 'KeyD' || e.code === 'ArrowRight') updateDir('right');
            
            if (['KeyW', 'KeyS', 'KeyA', 'KeyD', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
                playerRenderer.setDirection(direction);
                playerRenderer.setWalking(true);
                isWalking = true;
            }
            
            if (e.code === 'Space') {
                e.preventDefault();
                playerRenderer.setWalking(false);
                isWalking = false;
            }
        }
        
        function onKeyUp(e) {
            keys[e.code] = false;
            const anyPressed = Object.values(keys).some(v => v);
            if (!anyPressed) {
                playerRenderer.setWalking(false);
                isWalking = false;
            }
        }
        
        function drawGrid() {
            ctx.strokeStyle = 'rgba(125, 211, 252, 0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }
        
        let lastTime = performance.now();
        
        function animate(currentTime) {
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            ctx.fillStyle = '#1e1e3e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            
            if (isWalking) {
                const move = dirMap[direction];
                px += move.x;
                py += move.y;
                px = Math.max(50, Math.min(canvas.width - 50, px));
                py = Math.max(50, Math.min(canvas.height - 50, py));
            }
            
            playerRenderer.update(dt);
            playerRenderer.draw(ctx, px, py, direction);
            
            walkStatus.textContent = isWalking ? '行走中' : '静止';
            animFrame.textContent = playerRenderer.animationTime.toFixed(2);
            posX.textContent = Math.round(px);
            posY.textContent = Math.round(py);
            
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        
        requestAnimationFrame(animate);
    </script>
</body>
</html>
