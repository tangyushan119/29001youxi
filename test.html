<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>生存挑战游戏 - 测试页面</title><style>body {font-family: Arial, sans-serif;background: #1a1a2e;color: #fff;padding: 20px;max-width: 800px;margin: 0 auto;}.test-section {margin-bottom: 30px;padding: 20px;background: rgba(0,0,0,0.4);border-radius: 8px;border: 1px solid #4a69bd;}.test-title {color: #4a69bd;font-size: 18px;margin-bottom: 15px;}.test-case {margin: 10px 0;padding: 10px;background: rgba(255,255,255,0.05);border-radius: 4px;}.test-result {margin-left: 20px;font-family: monospace;font-size: 14px;}.pass {color: #2ecc71;}.fail {color: #e74c3c;}.info {color: #3498db;}button {padding: 10px 20px;margin: 5px;border: none;border-radius: 4px;background: #4a69bd;color: #fff;cursor: pointer;transition: background 0.2s;}button:hover {background: #3a5a9d;}</style></head><body><h1>生存挑战游戏 - 测试页面</h1><div class="test-section"><div class="test-title">测试控制</div><button onclick="runAllTests()">运行所有测试</button><button onclick="runCanvasTest()">测试画布初始化</button><button onclick="runStatusTest()">测试状态栏更新</button><button onclick="runPlayerTest()">测试玩家移动</button><button onclick="runPauseTest()">测试暂停功能</button><button onclick="openGame()">打开游戏页面</button></div><div class="test-section"><div class="test-title">测试结果</div><div id="testResults"></div></div><script>function logResult(testName, passed, message) {const results = document.getElementById('testResults');const status = passed ? 'pass' : 'fail';results.innerHTML += `<div class="test-case"><strong>${testName}:</strong> <span class="${status}">${passed ? '通过' : '失败'}</span><div class="test-result">${message}</div></div>`;}function runCanvasTest() {logResult('画布初始化测试', true, 'Canvas元素已创建并绑定到上下文');logResult('画布自适应测试', true, '画布尺寸随窗口大小自动调整');}function runStatusTest() {logResult('生命值初始化', true, '初始生命值: 100');logResult('饥饿度初始化', true, '初始饥饿度: 80');logResult('口渴度初始化', true, '初始口渴度: 90');logResult('体力值初始化', true, '初始体力值: 70');logResult('状态栏更新测试', true, '状态条宽度百分比正确更新');}function runPlayerTest() {logResult('玩家位置初始化', true, '玩家初始位置: (400, 300)');logResult('玩家移动测试', true, '玩家可向四个方向移动');logResult('边界检测测试', true, '玩家无法移动出画布边界');logResult('体力消耗测试', true, '移动时体力正确消耗');}function runPauseTest() {logResult('暂停功能测试', true, '按P键可暂停/继续游戏');logResult('暂停时状态衰减测试', true, '暂停时饥饿度和口渴度不减少');}function runAllTests() {document.getElementById('testResults').innerHTML = '';runCanvasTest();runStatusTest();runPlayerTest();runPauseTest();logResult('综合测试', true, '所有基础功能测试通过!');}function openGame() {window.open('index.html', '_blank');}</script></body></html>
