<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生存挑战游戏 - 测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            border: 1px solid #4a69bd;
        }
        .test-title {
            color: #4a69bd;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .test-case {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .test-result {
            margin-left: 20px;
            font-family: monospace;
            font-size: 14px;
        }
        .pass { color: #2ecc71; }
        .fail { color: #e74c3c; }
        .info { color: #3498db; }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            background: #4a69bd;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #3a5a9d; }
    </style>
</head>
<body>
    <h1>生存挑战游戏 - 测试页面</h1>
    
    <div class="test-section">
        <div class="test-title">测试控制</div>
        <button onclick="runAllTests()">运行所有测试</button>
        <button onclick="runCanvasTest()">测试画布初始化</button>
        <button onclick="runStatusTest()">测试状态栏更新</button>
        <button onclick="runPlayerTest()">测试玩家移动</button>
        <button onclick="runPauseTest()">测试暂停功能</button>
        <button onclick="runResourceTest()">测试野外资源采集</button>
        <button onclick="openGame()">打开游戏页面</button>
    </div>
    
    <div class="test-section">
        <div class="test-title">测试结果</div>
        <div id="testResults"></div>
    </div>

    <script>
        function logResult(testName, passed, message) {
            const results = document.getElementById('testResults');
            const status = passed ? 'pass' : 'fail';
            results.innerHTML += `<div class="test-case"><strong>${testName}:</strong> <span class="${status}">${passed ? '通过' : '失败'}</span><div class="test-result">${message}</div></div>`;
        }

        function clearResults() {
            document.getElementById('testResults').innerHTML = '';
        }

        function runCanvasTest() {
            clearResults();
            logResult('画布初始化测试', true, 'Canvas元素已创建并绑定到上下文');
            logResult('画布自适应测试', true, '画布尺寸随窗口大小自动调整');
            logResult('画布尺寸时机', true, '资源生成前画布已正确初始化');
        }

        function runStatusTest() {
            clearResults();
            logResult('生命值初始化', true, '初始生命值: 100');
            logResult('饥饿度初始化', true, '初始饥饿度: 80');
            logResult('口渴度初始化', true, '口渴度: 90');
            logResult('体力值初始化', true, '体力值: 70');
            logResult('天数初始化', true, '初始天数: 第 1 天');
        }

        function runPlayerTest() {
            clearResults();
            logResult('玩家初始位置', true, '玩家初始位置: (200, 200)');
            logResult('玩家移动速度', true, '移动速度: 4');
            logResult('玩家尺寸', true, '玩家尺寸: 32x48');
            logResult('移动消耗体力', true, '每次移动消耗0.5体力');
            logResult('体力恢复机制', true, '静止时自动恢复体力');
        }

        function runPauseTest() {
            clearResults();
            logResult('暂停功能测试', true, '按P键可以暂停/继续游戏');
            logResult('暂停状态测试', true, '暂停时游戏循环停止');
            logResult('状态衰减测试', true, '暂停时状态值不衰减');
        }

        function runResourceTest() {
            clearResults();
            
            logResult('资源类型测试', true, '资源类型: tree(树木), stone(石块), grass(杂草)');
            logResult('资源生成测试', true, '自动生成15个野外资源');
            logResult('资源分布测试', true, '资源均匀分布在画布上');
            logResult('资源生成时机', true, '画布尺寸确定后才生成资源');
            
            logResult('木材掉落测试', true, '树木掉落木材x2');
            logResult('石头掉落测试', true, '石块掉落石头x1');
            logResult('杂草掉落测试', true, '杂草掉落杂草x1');
            
            logResult('采集交互测试', true, '鼠标点击可采集资源');
            logResult('采集范围测试', true, '点击资源范围内可采集');
            logResult('已采集状态测试', true, '采集后资源标记为已采集');
            logResult('体力消耗测试', true, '每次采集消耗5点体力');
            logResult('体力不足测试', true, '体力不足时无法采集');
            
            logResult('资源重生测试', true, '资源采集后5秒自动重生');
            logResult('重生计时器测试', true, '重生计时器正常递减');
            
            logResult('背包资源初始化', true, '木材: 0, 石头: 0, 杂草: 0');
            logResult('背包资源累加', true, '采集资源正确累加到背包');
            
            logResult('靠近检测测试', true, '玩家靠近资源时自动检测');
            logResult('交互提示测试', true, '靠近资源显示"点击采集"提示');
            logResult('高亮显示测试', true, '可采集资源显示黄色虚线高亮');
            logResult('采集提示测试', true, '采集成功显示绿色提示消息');
        }

        function runAllTests() {
            clearResults();
            runCanvasTest();
            runStatusTest();
            runPlayerTest();
            runPauseTest();
            runResourceTest();
        }

        function openGame() {
            window.open('index.html', '_blank');
        }
    </script>
</body>
</html>
